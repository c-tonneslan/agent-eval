name: Eval Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run reasoning tasks (no API calls needed for exact-match)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run eval -- --reasoning --max 3
        # Runs 3 reasoning tasks — cheap (haiku), fast, catches regressions
        # Skip this step if ANTHROPIC_API_KEY is not set (fork PRs)
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: results/
          retention-days: 30
